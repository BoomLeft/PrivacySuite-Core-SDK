<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Oblivious HTTP topology — who knows what</title>
  <desc id="desc">OHTTP separates the client IP from the request content using two non-colluding parties: a relay and a gateway.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font-size: 26px; font-weight: 700; }
      .subtitle { fill: #475569; font-size: 14px; }
      .section { fill: #0f172a; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
      .label { fill: #0f172a; font-size: 14px; font-weight: 600; }
      .body { fill: #334155; font-size: 13px; }
      .mono { font-family: ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, monospace; font-size: 12px; fill: #0f172a; }
      .caption { fill: #64748b; font-size: 11.5px; }

      .client { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .relay  { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; }
      .gateway{ fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.8; }
      .target { fill: #fdf4ff; stroke: #a855f7; stroke-width: 1.8; }

      .know-yes { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.2; }
      .know-no  { fill: #ecfdf5; stroke: #059669; stroke-width: 1.2; }

      .pipe-encrypted { fill: none; stroke: #4f46e5; stroke-width: 3; }
      .pipe-plain     { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 8 5; }
      .arrow { fill: none; stroke: #475569; stroke-width: 1.6; }
      .ok { fill: #059669; font-weight: 700; }
      .x  { fill: #dc2626; font-weight: 700; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>

  <text class="title" x="40" y="56">Oblivious HTTP — Two Non-Colluding Parties</text>
  <text class="subtitle" x="40" y="80">RFC 9458 separates client identity from request content. The relay sees the IP; the gateway sees the request. Neither can correlate the two.</text>

  <!-- Pipes (drawn first so nodes sit on top) -->
  <g>
    <line class="pipe-encrypted" x1="190" y1="280" x2="430" y2="280"/>
    <line class="pipe-encrypted" x1="600" y1="280" x2="840" y2="280"/>
    <line class="pipe-plain"     x1="1010" y1="280" x2="1140" y2="280"/>
  </g>

  <!-- Pipe labels -->
  <text class="caption" x="220" y="262" fill="#4f46e5" font-weight="600">TLS, encrypted capsule</text>
  <text class="caption" x="630" y="262" fill="#4f46e5" font-weight="600">TLS, encrypted capsule</text>
  <text class="caption" x="1015" y="262" fill="#475569" font-weight="600">plain HTTPS</text>

  <!-- Client -->
  <g transform="translate(40, 220)">
    <rect class="client" width="150" height="120" rx="14"/>
    <text class="label" x="14" y="26">Client</text>
    <text class="caption" x="14" y="44">device + SDK</text>
    <text class="caption" x="14" y="62">encrypts capsule to</text>
    <text class="caption" x="14" y="78">gateway HPKE pubkey</text>
    <text class="caption" x="14" y="100" fill="#059669" font-weight="600">knows: target URL</text>
  </g>

  <!-- Relay -->
  <g transform="translate(430, 220)">
    <rect class="relay" width="170" height="120" rx="14"/>
    <text class="label" x="14" y="26">OHTTP Relay</text>
    <text class="caption" x="14" y="44">forwards capsule</text>
    <text class="caption" x="14" y="62">to gateway endpoint</text>
    <text class="mono" x="14" y="84">cannot decrypt</text>
    <text class="x" x="14" y="106" font-size="11.5">sees client IP only</text>
  </g>

  <!-- Gateway -->
  <g transform="translate(840, 220)">
    <rect class="gateway" width="170" height="120" rx="14"/>
    <text class="label" x="14" y="26">OHTTP Gateway</text>
    <text class="caption" x="14" y="44">decrypts capsule</text>
    <text class="caption" x="14" y="62">forwards plain HTTPS</text>
    <text class="mono" x="14" y="84">sees request body</text>
    <text class="x" x="14" y="106" font-size="11.5">sees only relay IP</text>
  </g>

  <!-- Target -->
  <g transform="translate(1010, 220)">
    <rect class="target" width="130" height="120" rx="14"/>
    <text class="label" x="14" y="26">Target</text>
    <text class="caption" x="14" y="44">api.example</text>
    <text class="caption" x="14" y="62">.com</text>
    <text class="caption" x="14" y="100" fill="#dc2626" font-weight="600">sees: gateway IP</text>
  </g>

  <!-- "Knows" matrix -->
  <g transform="translate(40, 390)">
    <text class="section" x="0" y="0">What each entity learns</text>

    <g transform="translate(0, 30)">
      <rect class="know-no" width="170" height="60" rx="8"/>
      <text class="label" x="14" y="24">Client</text>
      <text class="ok" x="14" y="44" font-size="11.5">Knows everything</text>
    </g>

    <g transform="translate(190, 30)">
      <rect class="know-yes" width="170" height="60" rx="8"/>
      <text class="label" x="14" y="24">Relay</text>
      <text class="caption" x="14" y="44">+ client IP   ✗ content</text>
    </g>

    <g transform="translate(380, 30)">
      <rect class="know-yes" width="170" height="60" rx="8"/>
      <text class="label" x="14" y="24">Gateway</text>
      <text class="caption" x="14" y="44">+ content   ✗ client IP</text>
    </g>

    <g transform="translate(570, 30)">
      <rect class="know-yes" width="170" height="60" rx="8"/>
      <text class="label" x="14" y="24">Target</text>
      <text class="caption" x="14" y="44">+ content   ✗ client IP</text>
    </g>

    <g transform="translate(760, 30)">
      <rect class="know-no" width="380" height="60" rx="8"/>
      <text class="label" x="14" y="24">Linkage</text>
      <text class="ok" x="14" y="44" font-size="11.5">No single party can correlate IP ↔ content</text>
    </g>
  </g>

  <!-- Crypto detail -->
  <g transform="translate(40, 500)">
    <text class="section" x="0" y="0">Capsule construction</text>
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="700" height="160" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
      <text class="mono" x="20" y="34">ephemeral_priv = X25519::random(OsRng)</text>
      <text class="mono" x="20" y="58">shared = ECDH(ephemeral_priv, gateway_public_key)</text>
      <text class="mono" x="20" y="82">key, nonce = HKDF(shared, info = "ohttp")</text>
      <text class="mono" x="20" y="106">capsule = XChaCha20-Poly1305_encrypt(key, nonce, http_request)</text>
      <text class="caption" x="20" y="138" fill="#64748b">low-order points and the all-zero gateway key are rejected at config-parse time (CryptoError::InvalidConfiguration).</text>
    </g>
  </g>

  <!-- Threat model side card -->
  <g transform="translate(760, 500)">
    <text class="section" x="0" y="0">Threat model</text>
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="380" height="160" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
      <text class="caption" x="14" y="22" fill="#0f172a" font-weight="600">Anonymity holds while:</text>
      <text class="caption" x="14" y="44">• Relay and gateway are operated by</text>
      <text class="caption" x="14" y="60">  separate entities</text>
      <text class="caption" x="14" y="80">• Gateway HPKE public key is</text>
      <text class="caption" x="14" y="96">  authentically provisioned</text>
      <text class="caption" x="14" y="116">• Client connects to relay over TLS</text>
      <text class="caption" x="14" y="132">  with cert pinning where required</text>
    </g>
  </g>

  <!-- Footer legend -->
  <g transform="translate(40, 690)">
    <line class="pipe-encrypted" x1="0" y1="0" x2="40" y2="0"/>
    <text class="caption" x="50" y="4">encrypted capsule (HPKE-class confidentiality)</text>
    <line class="pipe-plain" x1="370" y1="0" x2="410" y2="0"/>
    <text class="caption" x="420" y="4">plain HTTPS to target</text>
    <text class="caption" x="700" y="4" fill="#475569">module: privacysuite-core-sdk::networking::ohttp</text>
  </g>
</svg>
