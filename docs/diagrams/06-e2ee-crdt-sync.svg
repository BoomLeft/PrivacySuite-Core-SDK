<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end encrypted CRDT sync via blind relay</title>
  <desc id="desc">Two devices share an Automerge document. The relay forwards opaque ciphertext only — it never holds the VaultKey.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font-size: 26px; font-weight: 700; }
      .subtitle { fill: #475569; font-size: 14px; }
      .section { fill: #0f172a; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
      .label { fill: #0f172a; font-size: 14px; font-weight: 600; }
      .body { fill: #334155; font-size: 13px; }
      .mono { font-family: ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, monospace; font-size: 12px; fill: #0f172a; }
      .caption { fill: #64748b; font-size: 11.5px; }

      .device { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .layer  { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .relay  { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; }
      .key    { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.5; }
      .crdt   { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.5; }

      .pipe-cipher { fill: none; stroke: #4f46e5; stroke-width: 3; }
      .pipe-plain  { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 4; }
      .arrow { fill: none; stroke: #475569; stroke-width: 1.4; }
      .ok { fill: #059669; font-weight: 700; }
      .x  { fill: #dc2626; font-weight: 700; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>

  <text class="title" x="40" y="56">E2EE CRDT Sync — The Relay Is Blind</text>
  <text class="subtitle" x="40" y="80">Both devices hold the same VaultKey. The WebSocket relay only forwards opaque XChaCha20-Poly1305 frames. 16 MiB inbound cap stops OOM DoS.</text>

  <!-- Device A -->
  <g transform="translate(40, 130)">
    <rect class="device" width="320" height="440" rx="14"/>
    <text class="label" x="20" y="32" fill="#059669">Device A · phone</text>
    <text class="caption" x="20" y="50">paired with Device B via QR-code X25519 ECDH</text>

    <g transform="translate(20, 70)">
      <rect class="layer" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">Application</text>
      <text class="caption" x="14" y="42">read / write keys via EncryptedDocument</text>
    </g>

    <g transform="translate(20, 140)">
      <rect class="crdt" width="280" height="80" rx="10"/>
      <text class="label" x="14" y="22">Automerge AutoCommit</text>
      <text class="caption" x="14" y="40">CRDT — converges without conflicts</text>
      <text class="mono" x="14" y="62">generate_sync_message → bytes</text>
    </g>

    <g transform="translate(20, 230)">
      <rect class="key" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">VaultKey (256-bit)</text>
      <text class="caption" x="14" y="42">never leaves device · zeroized on drop</text>
    </g>

    <g transform="translate(20, 300)">
      <rect class="layer" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">EncryptedTransport</text>
      <text class="caption" x="14" y="42">XChaCha20-Poly1305 · v2 framing</text>
    </g>

    <g transform="translate(20, 370)">
      <rect class="layer" width="280" height="50" rx="10"/>
      <text class="label" x="14" y="22">RelayTransport (WSS)</text>
      <text class="caption" x="14" y="40">tokio-tungstenite · pinned cert</text>
    </g>
  </g>

  <!-- Relay -->
  <g transform="translate(440, 240)">
    <rect class="relay" width="300" height="220" rx="14"/>
    <text class="label" x="20" y="32" fill="#ea580c">Relay (BoomLeft / 3rd party)</text>
    <text class="caption" x="20" y="50">forwards binary frames only</text>

    <g transform="translate(20, 70)">
      <rect class="layer" width="260" height="60" rx="10"/>
      <text class="label" x="14" y="22">Frame routing</text>
      <text class="caption" x="14" y="42">match recipient · push frame</text>
    </g>

    <g transform="translate(20, 140)">
      <rect class="layer" width="260" height="60" rx="10"/>
      <text class="x" x="14" y="22" font-size="13">no VaultKey</text>
      <text class="caption" x="14" y="40">cannot read · cannot tamper</text>
    </g>
  </g>

  <!-- Device B -->
  <g transform="translate(820, 130)">
    <rect class="device" width="320" height="440" rx="14"/>
    <text class="label" x="20" y="32" fill="#059669">Device B · laptop</text>
    <text class="caption" x="20" y="50">paired with Device A — shares VaultKey</text>

    <g transform="translate(20, 70)">
      <rect class="layer" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">Application</text>
      <text class="caption" x="14" y="42">same map keys, same view</text>
    </g>

    <g transform="translate(20, 140)">
      <rect class="crdt" width="280" height="80" rx="10"/>
      <text class="label" x="14" y="22">Automerge AutoCommit</text>
      <text class="caption" x="14" y="40">applies remote ops</text>
      <text class="mono" x="14" y="62">receive_sync_message ← bytes</text>
    </g>

    <g transform="translate(20, 230)">
      <rect class="key" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">VaultKey (same bytes)</text>
      <text class="caption" x="14" y="42">established at pairing time</text>
    </g>

    <g transform="translate(20, 300)">
      <rect class="layer" width="280" height="60" rx="10"/>
      <text class="label" x="14" y="22">EncryptedTransport</text>
      <text class="caption" x="14" y="42">decrypts + verifies counter</text>
    </g>

    <g transform="translate(20, 370)">
      <rect class="layer" width="280" height="50" rx="10"/>
      <text class="label" x="14" y="22">RelayTransport (WSS)</text>
      <text class="caption" x="14" y="40">same pinned relay endpoint</text>
    </g>
  </g>

  <!-- Pipes between A → Relay → B (encrypted) -->
  <g>
    <line class="pipe-cipher" x1="360" y1="395" x2="440" y2="350"/>
    <line class="pipe-cipher" x1="740" y1="350" x2="820" y2="395"/>
  </g>

  <!-- Caption on pipes -->
  <text class="caption" x="368" y="375" fill="#4f46e5" font-weight="600">opaque frame</text>
  <text class="caption" x="748" y="375" fill="#4f46e5" font-weight="600">opaque frame</text>

  <!-- Bottom strip: guarantees -->
  <g transform="translate(40, 600)">
    <text class="section" x="0" y="0">Properties enforced by EncryptedTransport</text>
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="270" height="80" rx="10" class="layer"/>
      <text class="label" x="14" y="22">Confidentiality</text>
      <text class="caption" x="14" y="42">XChaCha20-Poly1305 · 192-bit nonce</text>
      <text class="caption" x="14" y="60">AAD = "ps:sync:v2" || sid || ctr</text>

      <rect x="290" y="0" width="270" height="80" rx="10" class="layer"/>
      <text class="label" x="304" y="22">Replay rejection</text>
      <text class="caption" x="304" y="42">monotonic per-direction u64 counter</text>
      <text class="caption" x="304" y="60">strict forward progress</text>

      <rect x="580" y="0" width="270" height="80" rx="10" class="layer"/>
      <text class="label" x="594" y="22">Session binding</text>
      <text class="caption" x="594" y="42">first inbound frame learns peer sid</text>
      <text class="caption" x="594" y="60">mid-session change ⇒ reject</text>

      <rect x="870" y="0" width="270" height="80" rx="10" class="layer"/>
      <text class="label" x="884" y="22">DoS / OOM caps</text>
      <text class="caption" x="884" y="42">16 MiB frame · 16 MiB blob</text>
      <text class="caption" x="884" y="60">control-frame flood cap = 64</text>
    </g>
  </g>
</svg>
