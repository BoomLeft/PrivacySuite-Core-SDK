[package]
name = "privacysuite-ffi"
# Version tracks the SDK tag the AAR is cut from, so consumers can pin a
# concrete version-tagged filename in `app/libs/`.
#   0.2.0 — first published AAR (landed alongside SDK v0.2.0).
#   0.3.0 — SDK v0.3.0 additions: validate_url, image metadata + dimension
#           gate, blind_index, pin_lock, KeystoreVault, BackgroundSync.
version = "0.3.0"
edition = "2021"
rust-version = "1.88"
description = "UniFFI bindings for PrivacySuite Core SDK — Android/iOS/Desktop"
authors = ["BoomLeft LLC"]
license = "Proprietary"
publish = false

[lib]
crate-type = ["lib", "cdylib"]
name = "privacysuite_ffi"

# Dedicated binary used by the Android AAR build pipeline to generate Kotlin
# bindings from the compiled cdylib via `uniffi::uniffi_bindgen_main`.
#
# See `android/build-aar.sh`: this binary is invoked with
#   `uniffi-bindgen generate --library target/<abi>/release/libprivacysuite_ffi.so
#    --language kotlin --out-dir ./src/main/kotlin`
# so the generated Kotlin is regenerated from the ABI actually shipped in the
# AAR, never a stale hand-written checkpoint.
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[features]
default = ["auth"]
auth = ["privacysuite-core-sdk/auth"]
# G7: surfaces `BackgroundSyncHost` (UniFFI callback interface) and
# `BackgroundSyncClient` for consumer apps that need a platform-agnostic
# scheduling abstraction. The core SDK's `sync` feature is pulled in for
# the schema types; no WebSocket / relay code is added to the FFI surface
# (those stay Rust-only for now).
sync = ["privacysuite-core-sdk/sync"]
# G5: expose `KeystoreVault` across UniFFI. Enabling this on a non-Android
# host still compiles — the exported Rust symbols go through the core
# SDK's stub types and every method returns `KeystoreError::NotAvailable`
# at runtime. The Android AAR build turns this feature on; other
# consumer apps can opt out to keep the Kotlin surface smaller.
keystore = ["privacysuite-core-sdk/keystore"]

[dependencies]
# SECURITY: FFI boundary dependencies pinned to exact versions.
privacysuite-core-sdk = { path = "..", default-features = false }
# SECURITY: `cli` feature enables `uniffi_bindgen_main`, required by the
# `uniffi-bindgen` binary above. Version stays pinned to `=0.31` to match
# the procmacro scaffolding already used in `src/lib.rs`.
uniffi = { version = "=0.31", default-features = false, features = ["cli"] }
thiserror = "=2"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
